
<!DOCTYPE html>

            min-height: 100vh;
            display: flex;

            justify-content: center;
            background: #0B1120;

        .container {

            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.8);

        /* Premium accent line */
        .container::before {

        h1 {

        .headline-main {

        }
        
        .headline-highlight {

        }

        .email-label {

            font-size: 0.85rem;

            letter-spacing: 0.3px;
        }
        
        .email-field {

            background: #1F2937;
            border: 1px solid #374151;
            border-radius: 16px;
            padding: 1.1rem 1.25rem;
            font-size: 1rem;
            color: white;
            transition: all 0.2s ease;
        }
        
        .email-field:focus {

            border-color: #FBBF24;
            background: #111827;
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
        }
        
        .email-field::placeholder {
            color: #4B5563;
            font-size: 0.95rem;
        }
        
        .button {
            width: 100%;
            background: linear-gradient(135deg, #FBBF24 0%, #F59E0B 100%);
            border: none;
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: #0B1120;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 1.5rem;
            letter-spacing: -0.01em;
            box-shadow: 0 10px 25px -5px rgba(251, 191, 36, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .button:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #FCD34D 0%, #F59E0B 100%);
            box-shadow: 0 20px 30px -8px rgba(251, 191, 36, 0.4);
        }
        
        .button:active {

        }
        
        .guarantee-grid {

            align-items: center;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 1px solid #1F2937;

        .guarantee-item {

            gap: 0.5rem;
            color: #9CA3AF;
            font-size: 0.85rem;
        }
        
        .check-icon {

            display: flex;
            align-items: center;

        }
        
        .dot {

            height: 4px;
            background: #FBBF24;

</html>
