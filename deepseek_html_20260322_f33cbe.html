<!DOCTYPE html>

    <style>
        * {

        body {

            min-height: 100vh;
            display: flex;

            justify-content: center;
            background: #030712;

            font-size: 0.8rem;

            width: 100%;
            background: #1F2937;
            border: 1px solid #374151;
            border-radius: 16px;
            padding: 1.1rem 1.25rem;
            font-size: 1rem;
            color: white;
            transition: all 0.2s ease;
        }
        
        .email-field:focus {
            outline: none;
            border-color: #FBBF24;
            background: #111827;
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
        }
        
        .email-field::placeholder {
            color: #4B5563;
            font-size: 0.95rem;
        }
        
        .button {
            width: 100%;
            background: linear-gradient(135deg, #FBBF24 0%, #F59E0B 100%);
            border: none;
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: #030712;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 1rem 0 1.5rem;
            letter-spacing: -0.01em;
            box-shadow: 0 10px 25px -5px rgba(251, 191, 36, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .button:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #FCD34D 0%, #F59E0B 100%);
            box-shadow: 0 20px 30px -8px rgba(251, 191, 36, 0.4);
        }
        
        .button:active {
            transform: translateY(0px);
        }
        
        .trust-strip {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 0;
            border-top: 1px solid #1F2937;
            border-bottom: 1px solid #1F2937;
        }
        
        .trust-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #9CA3AF;
            font-size: 0.8rem;
        }
        
        .trust-icon {

            font-size: 0.8rem;

        .stat {

        }
        
        .gold-dot {

            height: 6px;
            background: #FBBF24;
            border-radius: 50%;

        .commission-highlight {

            color: #FBBF24;
            font-weight: 500;
            display: flex;

            justify-content: center;
            gap: 0.75rem;
        }
        
        .commission-highlight span {

</head>
