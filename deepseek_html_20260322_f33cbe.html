        * {

        }

        body {
            min-height: 100vh;

            align-items: center;
            justify-content: center;
            transition: background-color 0.2s ease;
            font-synthesis: none;
            text-rendering: optimizeLegibility;

        }

        .conversion-fortress {
            max-width: 560px;
            width: 100%;
            border-radius: 2rem;
            padding: 2.2rem 2rem 2.5rem 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 4px 12px rgba(0, 0, 0, 0.05);

        }

        .headline {
            font-size: 2.5rem;
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin-bottom: 1.2rem;
            font-weight: 800;
        }

        .subheadline {
            font-size: 1.2rem; 
            line-height: 1.4;
            margin-bottom: 2rem;
            opacity: 0.85;
            font-weight: 450;
        }

        .lead-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .input-group {
            width: 100%;
        }

        .email-input {
            width: 100%;
            padding: 1rem 1.2rem;
            font-size: 1rem;
            border-radius: 60px;
            border: 1.5px solid;
            background: rgba(255, 255, 255, 0.96);
            transition: all 0.2s;
            font-family: inherit;
            outline: none;
        }

        .email-input:focus {
            transform: scale(1.01);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
            border-width: 1.5px;
        }

        .cta-button {
            width: 100%;
            padding: 1rem 1.2rem;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            letter-spacing: -0.2px;
            font-family: inherit;
            background: var(--btn-bg);
            color: var(--btn-text);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
        }

        .cta-button:hover {
            transform: translateY(-2px) scale(1.01);
            filter: brightness(1.05);
            box-shadow: 0 12px 22px -8px rgba(0, 0, 0, 0.2);
        }

        .cta-button:active {
            transform: translateY(1px);
        }

        .success-message {
            text-align: center;
            padding: 2rem 1rem;
            border-radius: 1.5rem;
            font-size: 1.25rem;
            font-weight: 500;
            line-height: 1.4;
            margin-top: 0.5rem;
        }

        .trust-micro {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 1.8rem;
            opacity: 0.7;
            letter-spacing: 0.2px;
        }

        .hidden-form {
            display: none;
        }

        .hidden-success {
            display: none;
        }

        @media (max-width: 550px) {
            .conversion-fortress {
                padding: 1.8rem 1.5rem 2rem 1.5rem;
            }
            .headline {
                font-size: 2rem;
            }
            .subheadline {
                font-size: 1rem;
            }
        }

    function getRandomFramework() {
        const randomIndex = Math.floor(Math.random() * frameworksLibrary.length);
        return frameworksLibrary[randomIndex];
    }
    
    let currentFramework = null;
    
    function renderPage(framework) {
        const root = document.getElementById('appRoot');
        if (!root) return;
        
        document.body.style.backgroundColor = framework.colors.bg;
        document.body.style.fontFamily = framework.fontPair.body;
        
        const cardHTML = `
            <div style="background: ${framework.colors.bg}; border-radius: 2rem; border-left: 6px solid ${framework.colors.accent}; box-shadow: 0 30px 45px -20px rgba(0,0,0,0.3);">

                </div>
            </div>
        `;
        
        root.innerHTML = cardHTML;
        
        const form = document.getElementById('emailCaptureForm');
        const successContainer = document.getElementById('successMessageContainer');
        
        if (form) {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const emailInput = document.getElementById('emailInput');
                const email = emailInput.value.trim();
                
                if (!email || !email.includes('@') || !email.includes('.')) {
                    emailInput.style.borderColor = framework.colors.accent;
                    emailInput.style.boxShadow = `0 0 0 2px ${framework.colors.accent}40`;
                    emailInput.placeholder = "⚠️ Valid email required — secure your fix now";
                    setTimeout(() => {
                        emailInput.style.borderColor = framework.colors.border;
                        emailInput.style.boxShadow = '';
                        emailInput.placeholder = "✉️ Your email — bypass the pain, unlock the gain";
                    }, 2000);
                    return;
                }
                
                const formData = new FormData();
                formData.append('e123432', email);
                formData.append('lllid', '123432');
                formData.append('lluid', 'sandyarta');
                formData.append('redirect', '');
                formData.append('source', '');
                
                try {
                    await fetch('https://www.sendsteed.com/subscribe/', {
                        method: 'POST',
                        mode: 'no-cors',
                        body: formData
                    });
                    
                    form.classList.add('hidden-form');
                    successContainer.classList.remove('hidden-success');
                    successContainer.classList.add('success-message');
                    successContainer.style.backgroundColor = `${framework.colors.accent}20`;
                    successContainer.style.borderLeft = `4px solid ${framework.colors.accent}`;

                        <div style="font-size: 0.85rem; margin-top: 1rem;">✨ We just sent the remedy to ${email.substring(0, 18)}... Open it now.</div>

                    form.classList.add('hidden-form');
                    successContainer.classList.remove('hidden-success');
                    successContainer.classList.add('success-message');
                    successContainer.style.backgroundColor = `${framework.colors.accent}20`;
                    successContainer.style.borderLeft = `4px solid ${framework.colors.accent}`;
